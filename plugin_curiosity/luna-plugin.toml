# Data manifest — read by the marketplace + installer without importing Python.
# Keep in sync with PluginManifest in __init__.py.

name = "plugin-curiosity"
version = "0.10.1"
description = "Mission-driven curiosity: research, wiki-building, nightly dreams, proactive reflections, and a Missions pane."
entry = "plugin_curiosity"
sdk_version = "0"
license = "MIT"
tags = ["curiosity", "mission", "autonomy"]
capabilities = ["wiki"]
depends_on = ["plugin-wiki", "plugin-scheduler"]
readme = """
# plugin-curiosity

Give Luna a mission and she gets curious: she researches the domain, builds a
knowledge wiki (plugin-wiki), dreams nightly to consolidate what she learned,
and proactively shares grounded reflections — earning trust before asking for
tools or autonomy.

Pairs with plugin-wiki (knowledge substrate), plugin-scheduler (ambient clock)
and plugin-playbooks (action rails).

0.10.0: when plugin-goalseek is installed, curiosity's whole goal machinery
switches to it — goal_set delegates opens into the governed Goal-Seek engine
(stages, policies, heartbeats, the Goals pane) keeping mission membership;
goal_update/goal_list are served by Goal-Seek itself. Standalone curiosity
behaves exactly as before. Existing open goals migrate under a single owner
approval card.
"""

# 034/phase03 prompt-slot claims — the installer shows these to the owner in
# plain words and asks consent before the plugin loads. core.drive = the
# curiosity fragment replaces the default drive slot; core.onboarding = the
# mission-first ordering is written into the setup checklist itself.
[prompt]
overrides = ["core.drive", "core.onboarding"]

[requires]
tools = 1
